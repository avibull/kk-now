<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Barcode Debug</title>
  <style>
    body { margin:0; background:#000; color:#0f0; font-family:monospace; }
    #video { width:100vw; height:55vh; object-fit:cover; background:#111; }
    #status { padding:10px; background:#111; color:#0f0; font-size:13px; }
    #log { height:35vh; overflow:auto; padding:10px; font-size:13px; }
    .hit { color:#ff0; font-size:18px; font-weight:bold; }
    .err { color:#f66; }
    .info { color:#aaa; }
  </style>
</head>
<body>

<video id="video" playsinline autoplay muted></video>
<div id="status">Starting...</div>
<div id="log"></div>

<script>
const video = document.getElementById('video');
const statusEl = document.getElementById('status');
const logEl = document.getElementById('log');

let frames = 0;
let hits = 0;
let reader = null;

function log(msg, cls = 'info') {
  const div = document.createElement('div');
  div.className = cls;
  div.textContent = new Date().toLocaleTimeString() + ' | ' + msg;
  logEl.prepend(div);
}

function status(msg) {
  statusEl.textContent = msg;
}

function loadZxing() {
  return new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = 'https://unpkg.com/@zxing/library@0.19.1/umd/index.min.js';
    s.onload = resolve;
    s.onerror = reject;
    document.head.appendChild(s);
  });
}

async function start() {
  try {
    status('Loading ZXing...');
    await loadZxing();
    log('ZXing loaded');

    const hints = new Map();
    hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [
      ZXing.BarcodeFormat.CODE_128,
      ZXing.BarcodeFormat.CODE_39,
      ZXing.BarcodeFormat.ITF,
      ZXing.BarcodeFormat.EAN_13,
      ZXing.BarcodeFormat.EAN_8,
      ZXing.BarcodeFormat.CODABAR,
      ZXing.BarcodeFormat.QR_CODE
    ]);
    hints.set(ZXing.DecodeHintType.TRY_HARDER, true);

    reader = new ZXing.BrowserMultiFormatReader(hints, 300);

    status('Starting camera...');
    log('Starting camera');

    await reader.decodeFromVideoDevice(null, video, (result, err) => {
      frames++;

      if (frames % 10 === 0) {
        status('Running | frames:' + frames + ' hits:' + hits);
      }

      if (result) {
        hits++;
        const text = result.getText();
        const format = result.getBarcodeFormat();
        status('HIT | ' + format + ' | ' + text);
        log('✅ HIT [' + format + ']: ' + text, 'hit');
      }

      if (err) {
        if (
          err.name !== 'NotFoundException' &&
          err.name !== 'ChecksumException' &&
          err.name !== 'FormatException'
        ) {
          log('Decode error: ' + err.name + ' ' + err.message, 'err');
        }
      }
    });

    log('Scanner started. Point at barcode.');
    status('Running | frames:0 hits:0');

  } catch (e) {
    status('ERROR: ' + e.message);
    log('ERROR: ' + e.message, 'err');
  }
}

start();
</script>

</body>
</html>
