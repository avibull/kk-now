<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Kaidoo Debug v6 - Native</title>
<style>
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:monospace; background:#000; color:#0f0; font-size:13px; display:flex; flex-direction:column; height:100vh; height:100dvh; }
  #video { width:100vw; height:50vh; object-fit:cover; display:block; flex-shrink:0; }
  #status { background:#111; padding:8px 12px; font-size:12px; color:#0f0; flex-shrink:0; border-bottom:1px solid #222; }
  #log { padding:8px; flex:1; overflow-y:auto; }
  .hit  { color:#ff0; font-weight:bold; font-size:15px; padding:6px 0; border-bottom:1px solid #333; word-break:break-all; }
  .info { color:#888; padding:3px 0; border-bottom:1px solid #111; }
  .err  { color:#f44; padding:3px 0; border-bottom:1px solid #111; }
</style>
</head>
<body>
<video id="video" playsinline autoplay muted></video>
<div id="status">Starting...</div>
<div id="log"></div>
<script>
const logEl    = document.getElementById('log');
const statusEl = document.getElementById('status');
let frames = 0, hits = 0, detecting = false;

function log(msg, type) {
  const d = document.createElement('div');
  d.className = type || 'info';
  d.textContent = new Date().toLocaleTimeString() + ' | ' + msg;
  logEl.insertBefore(d, logEl.firstChild);
  while (logEl.children.length > 80) logEl.removeChild(logEl.lastChild);
}

async function start() {
  // Check support
  if (!('BarcodeDetector' in window)) {
    log('BarcodeDetector NOT supported on this browser', 'err');
    statusEl.textContent = 'ERROR: Not supported';
    return;
  }

  // Get ALL supported formats
  const supported = await BarcodeDetector.getSupportedFormats();
  log('Supported formats (' + supported.length + '): ' + supported.join(', '), 'info');

  // Use ALL formats
  const detector = new BarcodeDetector({ formats: supported });

  // Start camera — try landscape first for better barcode scanning
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: 'environment',
        width:  { ideal: 1920 },
        height: { ideal: 1080 }
      }
    });
    const video = document.getElementById('video');
    video.srcObject = stream;
    await video.play();

    video.addEventListener('loadedmetadata', () => {
      log('Camera: ' + video.videoWidth + 'x' + video.videoHeight, 'info');
    });

    log('Running — point at barcode', 'info');

    // Run detection as fast as possible — no sleep, back to back
    async function loop() {
      if (video.readyState === video.HAVE_ENOUGH_DATA && !detecting) {
        detecting = true;
        frames++;
        statusEl.textContent = 'frames:' + frames + ' | hits:' + hits + ' | scanning...';
        try {
          const results = await detector.detect(video);
          if (results.length > 0) {
            for (const r of results) {
              hits++;
              log('✅ [' + r.format + '] ' + r.rawValue, 'hit');
              statusEl.textContent = 'HIT! frames:' + frames + ' hits:' + hits;
            }
          }
        } catch(e) {
          if (frames < 5) log('detect error: ' + e.message, 'err');
        }
        detecting = false;
      }
      requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);

  } catch(e) {
    log('Camera error: ' + e.message, 'err');
    statusEl.textContent = 'Camera error: ' + e.message;
  }
}

start();
</script>
</body>
</html>
